<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TTS Debug Audio Browser</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 24px;
      color: #111;
      background: #f7f7f8;
    }
    h1 {
      margin: 0 0 12px 0;
      font-size: 22px;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 12px;
    }
    button {
      padding: 8px 12px;
      border: 1px solid #c9c9cf;
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid #ddd;
    }
    th, td {
      text-align: left;
      padding: 10px;
      border-bottom: 1px solid #eee;
      vertical-align: middle;
      font-size: 13px;
    }
    th { background: #fafafa; }
    audio { width: 320px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h1>TTS Debug Audio Browser</h1>
  <div class="toolbar">
    <button id="refreshBtn">Refresh</button>
    <span id="countLabel"></span>
  </div>

  <table>
    <thead>
      <tr>
        <th>File</th>
        <th>Updated</th>
        <th>Size</th>
        <th>Player</th>
        <th>Link</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

  <div class="hint">
    サーバー起動後、<code>PERM_TTS_SAVE_DEBUG_AUDIO=1</code> で保存された WAV を再生できます。
  </div>

  <script>
    const rowsEl = document.getElementById("rows");
    const countLabel = document.getElementById("countLabel");
    const refreshBtn = document.getElementById("refreshBtn");

    function fmtBytes(n) {
      if (n < 1024) return `${n} B`;
      if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
      return `${(n / (1024 * 1024)).toFixed(2)} MB`;
    }

    function fmtTime(ts) {
      const d = new Date(ts * 1000);
      return d.toLocaleString();
    }

    async function loadList() {
      rowsEl.innerHTML = "";
      try {
        const resp = await fetch("/api/tts-debug-files");
        const data = await resp.json();
        const files = data.files || [];
        countLabel.textContent = `${files.length} files`;

        for (const f of files) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td class="mono">${f.name}</td>
            <td>${fmtTime(f.modified_ts)}</td>
            <td>${fmtBytes(f.size_bytes)}</td>
            <td><audio controls preload="none" src="${f.url}"></audio></td>
            <td><a href="${f.url}" target="_blank" rel="noopener">open</a></td>
          `;
          rowsEl.appendChild(tr);
        }
      } catch (e) {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td colspan="5">failed to load: ${String(e)}</td>`;
        rowsEl.appendChild(tr);
      }
    }

    refreshBtn.onclick = loadList;
    loadList();
  </script>
</body>
</html>
